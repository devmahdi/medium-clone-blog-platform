name: Vercel Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontend/**'
      - 'packages/**'
      - '.github/workflows/vercel-deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/frontend/**'
      - 'packages/**'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Lint and type check before deploying
  quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: cd apps/frontend && pnpm run lint

      - name: Type check
        run: cd apps/frontend && pnpm run type-check

      - name: Build frontend
        run: cd apps/frontend && pnpm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # Deploy to Vercel
  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Comment PR with Preview URL
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy.outputs.deployment_url }}';
            const comment = `## 🚀 Preview Deployment
            
            Your frontend has been deployed to Vercel!
            
            **Preview URL:** ${deploymentUrl}
            
            ✅ Build successful
            📊 [View deployment logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ---
            *This preview will be automatically deleted when the PR is closed.*`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Notify Slack (Preview)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="Preview Deployed"
            COLOR="good"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="Preview Failed"
            COLOR="danger"
          fi
          
          curl -X POST $SLACK_WEBHOOK_URL \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "'"$STATUS_ICON"' Frontend Preview Deployment",
              "attachments": [{
                "color": "'"$COLOR"'",
                "fields": [
                  {"title": "Status", "value": "'"$STATUS_TEXT"'", "short": true},
                  {"title": "PR", "value": "#${{ github.event.pull_request.number }}", "short": true},
                  {"title": "Branch", "value": "${{ github.head_ref }}", "short": true},
                  {"title": "Author", "value": "${{ github.actor }}", "short": true},
                  {"title": "Preview URL", "value": "${{ steps.deploy.outputs.deployment_url }}", "short": false}
                ]
              }]
            }'

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Vercel (Production)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Health Check
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30
          
          # Health check with retry
          for i in {1..5}; do
            if curl -f "${{ steps.deploy.outputs.deployment_url }}/api/health"; then
              echo "✅ Health check passed!"
              exit 0
            else
              echo "⏳ Health check failed, retrying in 10s... ($i/5)"
              sleep 10
            fi
          done
          
          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Notify Slack (Production)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="Production Deployed"
            COLOR="good"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="Production Failed"
            COLOR="danger"
          fi
          
          curl -X POST $SLACK_WEBHOOK_URL \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "'"$STATUS_ICON"' Frontend Production Deployment",
              "attachments": [{
                "color": "'"$COLOR"'",
                "fields": [
                  {"title": "Status", "value": "'"$STATUS_TEXT"'", "short": true},
                  {"title": "Environment", "value": "Production", "short": true},
                  {"title": "Commit", "value": "${{ github.sha }}", "short": true},
                  {"title": "Author", "value": "${{ github.actor }}", "short": true},
                  {"title": "URL", "value": "${{ steps.deploy.outputs.deployment_url }}", "short": false},
                  {"title": "Action", "value": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }'

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment URL:** ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Code quality" >> $GITHUB_STEP_SUMMARY
          echo "- Type checking" >> $GITHUB_STEP_SUMMARY
          echo "- Build successful" >> $GITHUB_STEP_SUMMARY
          echo "- Health check passed" >> $GITHUB_STEP_SUMMARY
